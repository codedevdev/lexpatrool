name: Release (Windows) — manual only

# Теги `v*` обрабатываются в `.github/workflows/ci.yml` (тесты → сборка → релиз).
# Этот workflow оставлен для ручной сборки артефактов без публикации релиза.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Node (Vitest)
        run: npm rebuild better-sqlite3

      - name: Lint and tests (same gate as CI)
        run: npm run lint && npm run test:ci:critical && npm run test:ci

      - name: Build app (electron-vite + electron-builder)
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Generate SHA256 sidecars for installers
        shell: pwsh
        run: |
          Get-ChildItem -Path 'LexPatrool-bin' -Filter '*.exe' -File | ForEach-Object {
            $h = (Get-FileHash -Algorithm SHA256 -Path $_.FullName).Hash.ToLowerInvariant()
            $sidecar = $_.FullName + '.sha256'
            Set-Content -LiteralPath $sidecar -Value $h -NoNewline -Encoding ascii
            Write-Host "Wrote $sidecar"
          }

      - name: Upload artifacts (manual workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: lexpatrol-windows-build
          path: |
            LexPatrool-bin/LexPatrol Setup *.exe
            LexPatrool-bin/LexPatrol Setup *.exe.sha256
            LexPatrool-bin/LexPatrol *.exe
            LexPatrool-bin/LexPatrol *.exe.sha256
          if-no-files-found: error
