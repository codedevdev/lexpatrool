name: Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (electron-vite + electron-builder)
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installers to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        # Текст релиза: GitHub генерирует заметки по API (PR, контрибьюторы). Шаблон секций — .github/release.yml
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            LexPatrool-bin/LexPatrol Setup *.exe
            LexPatrool-bin/LexPatrol *.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (manual workflow run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: lexpatrol-windows-build
          path: |
            LexPatrool-bin/LexPatrol Setup *.exe
            LexPatrool-bin/LexPatrol *.exe
          if-no-files-found: error
